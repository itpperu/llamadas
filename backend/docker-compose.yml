version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: llamadas_db
      DB_USERNAME: llamadas_user
      DB_PASSWORD: llamadas_pass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: llamadas_db
      DB_USERNAME: llamadas_user
      DB_PASSWORD: llamadas_pass
    depends_on:
      db:
        condition: service_healthy
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    networks:
      - laravel

  web:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: llamadas_db
      MYSQL_USER: llamadas_user
      MYSQL_PASSWORD: llamadas_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "33061:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laravel

networks:
  laravel:

volumes:
  dbdata: